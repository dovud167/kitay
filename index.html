<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER_FINANCE_OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>[ SYSTEM_FINANCE_CORE ]</h1>
    </header>

   <div class="stats-container">
    <div class="circle-box">
        <div class="circle" id="inc-circle" style="border-color: #00ff41;">0</div>
        <span class="label">ДОХОД</span>
    </div>
    <div class="circle-box">
        <div class="circle" id="exp-circle" style="border-color: #ff4141;">0</div>
        <span class="label">РАСХОД</span>
    </div>
    <div class="circle-box">
        <div class="circle" id="total-circle" style="border-color: #00d4ff;">0</div>
        <span class="label">ИТОГ</span>
    </div>
</div>

    <div class="main-card">
        <input type="text" id="title" placeholder=">_ ОПИСАНИЕ...">
        <input type="number" id="amount" placeholder=">_ СУММА...">
        <select id="type">
            <option value="income">ДОХОД (+)</option>
            <option value="expense">РАСХОД (-)</option>
        </select>
        
        <button id="save-btn" class="btn-execute" onclick="saveData()">[ ВЫПОЛНИТЬ ТРАНЗАКЦИЮ ]</button>
        
        <button id="cancel-btn" class="btn-cancel" onclick="resetForm()" style="display:none;">[ ОТМЕНА РЕДАКТИРОВАНИЯ ]</button>

        <div id="list" class="list-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
