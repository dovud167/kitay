<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HACKER_FINANCE_OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>[ SYSTEM_FINANCE_CORE ]</h1>
    </header>

    <div class="stats-container">
        <div class="circle-box">
            <div class="circle" id="inc-circle">0</div>
            <span>INCOME+</span>
        </div>
        <div class="circle-box">
            <div class="circle" id="exp-circle">0</div>
            <span>EXPENSE-</span>
        </div>
    </div>

    <div class="page active">
        <input type="text" id="title" placeholder="ITEM_NAME...">
        <input type="number" id="amount" placeholder="AMOUNT...">
        <select id="type"><option value="income">INCOME</option><option value="expense">EXPENSE</option></select>
        <button id="save-btn" onclick="saveData()">[ ADD_RECORD ]</button>
        
        <div id="list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
