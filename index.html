<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Finance Pro — Учет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Finance Pro</h1>
        <p>⚡ Учет каждого сомони. Результат будет завтра. ⚡</p>
    </header>

    <nav>
        <button onclick="switchPage('main')" id="nav-main" class="active">Главная</button>
        <button onclick="switchPage('add')" id="nav-add">Добавить</button>
    </nav>

    <div class="container">
        <div id="page-main" class="page active-page">
            <div class="card">
                <h2>Баланс</h2>
                <div id="summary"></div>
            </div>
            <div class="card">
                <h2>История</h2>
                <div id="records-list"></div>
            </div>
        </div>

        <div id="page-add" class="page">
            <div class="card">
                <h2>Новая запись</h2>
                <input type="text" id="title" placeholder="Описание (заказ/еда)">
                <input type="number" id="amount" placeholder="Сумма (сомони)">
                <select id="type">
                    <option value="income">Доход (+)</option>
                    <option value="expense">Расход (-)</option>
                </select>
                <button class="btn-main" onclick="saveRecord()">[ СОХРАНИТЬ ]</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
